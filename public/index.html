<!DOCTYPE html>
<html>
<head>
  <title>Great Plains Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="chatbot">
  <div id="chat-header">Great Plains Assistant</div>
  <div id="chat-messages">
    <div class="bot-message">Hi! Ask me about Great Plains Manufacturing.</div>
  </div>
  <div id="chat-input-area">
    <input id="chat-input" placeholder="Type your question..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="chatbot.js"></script>
</body>
</html>
